        }
        
        function countMatches(text, keyword) {
            if (!text || !keyword) return 0;
            var count = 0;
            var pos = 0;
            text = text.toLowerCase();
            while ((pos = text.indexOf(keyword, pos)) !== -1) {
                count++;
                pos += keyword.length;
            }
            return count;
        }
        
        function doSearch() {
            var education = document.getElementById('educationSelect').value;
            var keyword = document.getElementById('keywordInput').value.trim().toLowerCase();
            var resultContainer = document.getElementById('resultContainer');
            var resultCount = document.getElementById('resultCount');
            var stats = document.getElementById('stats');
            var matchStats = document.getElementById('matchStats');
            
            totalSearchCount++;
            
            var filtered = [];
            var matchDetail = { '岗位名称': 0, '专业': 0, '岗位要求': 0, '单位名称': 0 };
            
            for (var i = 0; i < jobsData.length; i++) {
                var job = jobsData[i];
                var jobEdu = (job['学历'] || '').toLowerCase();
                
                if (education) {
                    var match = false;
                    if (education === '博士' && (jobEdu.indexOf('博士') > -1)) match = true;
                    else if (education === '硕士' && (jobEdu.indexOf('硕士') > -1)) match = true;
                    else if (education === '本科' && (jobEdu.indexOf('本科') > -1)) match = true;
                    else if (education === '专科' && (jobEdu.indexOf('专科') > -1)) match = true;
                    else if (education === '不限' && (jobEdu.indexOf('不限') > -1 || jobEdu === '')) match = true;
                    if (!match) continue;
                }
                
                if (keyword) {
                    var searchText = (job['岗位名称'] + ' ' + job['专业'] + ' ' + job['岗位要求'] + ' ' + job['单位名称']).toLowerCase();
                    if (searchText.indexOf(keyword) === -1) continue;
                    
                    matchDetail['岗位名称'] += countMatches(job['岗位名称'], keyword);
                    matchDetail['专业'] += countMatches(job['专业'], keyword);
                    matchDetail['岗位要求'] += countMatches(job['岗位要求'], keyword);
                    matchDetail['单位名称'] += countMatches(job['单位名称'], keyword);
                }
                
                filtered.push(job);
            }
            
            resultCount.textContent = '共找到 ' + filtered.length + ' 个匹配岗位';
            
            // 保存搜索记录（只有用户主动搜索时才保存，空搜索不记录）
            if (education || keyword) {
                saveSearchLog(education, keyword, filtered.length);
            }
            
            var sourceCount = {};
            for (var i = 0; i < filtered.length; i++) {
                var s = filtered[i]['来源'] || '未知';
                sourceCount[s] = (sourceCount[s] || 0) + 1;
            }
            var statsHtml = '来源分布：';
            for (var s in sourceCount) {
                statsHtml += s + '(' + sourceCount[s] + ') ';
            }
            stats.textContent = statsHtml;
            
            if (keyword && filtered.length > 0) {
                var totalMatches = matchDetail['岗位名称'] + matchDetail['专业'] + matchDetail['岗位要求'] + matchDetail['单位名称'];
                matchStats.innerHTML = '<h3>匹配统计："' + escapeHtml(keyword) + '"</h3>' +
                    '<div class="match-item"><span class="match-field">岗位名称</span><span class="match-count">' + matchDetail['岗位名称'] + ' 次</span></div>' +
                    '<div class="match-item"><span class="match-field">专业要求</span><span class="match-count">' + matchDetail['专业'] + ' 次</span></div>' +
                    '<div class="match-item"><span class="match-field">岗位要求</span><span class="match-count">' + matchDetail['岗位要求'] + ' 次</span></div>' +
                    '<div class="match-item"><span class="match-field">单位名称</span><span class="match-count">' + matchDetail['单位名称'] + ' 次</span></div>' +
                    '<div class="match-item"><span class="match-field">总计匹配</span><span class="match-count">' + totalMatches + ' 次</span></div>';
                matchStats.style.display = 'block';
            } else {
                matchStats.style.display = 'none';
            }
            
            if (filtered.length === 0) {
                resultContainer.innerHTML = '<div class="no-result"><div class="no-result-icon">没有找到</div><div class="no-result-text">未找到匹配的岗位，请尝试调整搜索条件</div></div>';
                return;
            }
            
            var displayLimit = 50;
            var displayJobs = filtered.slice(0, displayLimit);
            
            var html = '';
            for (var i = 0; i < displayJobs.length; i++) {
                var job = displayJobs[i];
                var salary = job['工资待遇'] || '面议';
                var requirement = job['岗位要求'] ? '<div class="requirement"><div class="requirement-label">岗位要求</div><div class="requirement-text">' + escapeHtml(job['岗位要求']) + '</div></div>' : '';
                var contactName = job['联系人'] ? '<div class="contact-item"><div class="contact-label">联系人</div><div class="contact-value">' + escapeHtml(job['联系人']) + '</div></div>' : '';
                var contactPhone = job['联系方式'] ? '<div class="contact-item"><div class="contact-label">联系方式</div><div class="contact-value">' + escapeHtml(job['联系方式']) + '</div></div>' : '';
                
                html += '<div class="job-card">' +
                    '<div class="job-header"><div class="job-title">' + escapeHtml(job['岗位名称']) + '</div><div class="job-count">招聘 ' + escapeHtml(job['人数'] || '若干') + ' 人</div></div>' +
                    '<div class="company-name">' + escapeHtml(job['单位名称']) + '</div>' +
                    '<div class="source-tag">来源：' + escapeHtml(job['来源']) + '</div>' +
                    '<div class="info-grid">' +
                    '<div class="info-item"><div class="info-label">学历要求</div><div class="info-value">' + escapeHtml(job['学历'] || '不限') + '</div></div>' +
                    '<div class="info-item"><div class="info-label">薪资待遇</div><div class="info-value">' + escapeHtml(salary) + '</div></div>' +
                    '<div class="info-item" style="grid-column: 1 / -1;"><div class="info-label">专业要求</div><div class="info-value">' + escapeHtml(job['专业'] || '不限') + '</div></div>' +
                    '</div>' + requirement +
                    '<div class="contact-box">' + contactName + contactPhone + '</div>' +
                    '</div>';
            }
            
            if (filtered.length > displayLimit) {
                html += '<div class="no-result"><div class="no-result-text">仅显示前' + displayLimit + '条，共' + filtered.length + '条结果。请细化搜索条件以缩小范围。</div></div>';
            }
            
            resultContainer.innerHTML = html;
        }
        
        document.getElementById('searchBtn').addEventListener('click', doSearch);
        document.getElementById('searchBtn').addEventListener('touchend', function(e) { e.preventDefault(); doSearch(); });
        document.getElementById('educationSelect').addEventListener('change', doSearch);
        document.getElementById('keywordInput').addEventListener('input', doSearch);
        doSearch();
    </script>
</body>
</html>
